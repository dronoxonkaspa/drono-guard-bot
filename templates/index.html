<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dronox Core Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <nav class="navbar">
    <div class="logo"><a href="/">DRONOX</a></div>
    <div class="links">
      <a href="/" class="active">Home</a>
      <a href="/core">Core</a>
      <a href="/vision">Vision</a>
    </div>
  </nav>

  <div id="scene">
    <div class="grid-overlay"></div>
    <div class="particles">
      {% for i in range(60) %}
      <span style="left: {{ (loop.index * 3) % 100 }}%; top: {{ (loop.index * 17) % 100 }}%; animation-delay: {{ (loop.index * 0.5) % 10 }}s;"></span>
      {% endfor %}
    </div>

    <main class="hero">
      <h1>Dronox Core Network</h1>
      <p>Interconnected protocols. Unified vision.<br />Powered by Dronox.</p>
      <div class="pulse-beam"></div>
      <div class="buttons">
        <a href="/core">Explore Core</a>
        <a href="/vision">The Vision</a>
      </div>
    </main>

    <footer>
      <p>© 2025 Dronox Ecosystem | All Rights Reserved</p>
    </footer>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      requestAnimationFrame(() => document.body.classList.add("fade-in"));
      document.querySelectorAll("a[href]").forEach(link => {
        const url = new URL(link.href, window.location.origin);
        if (url.origin === window.location.origin) {
          link.addEventListener("click", e => {
            e.preventDefault();
            document.body.classList.remove("fade-in");
            document.body.classList.add("fade-out");
            setTimeout(() => (window.location.href = link.href), 200);
          });
        }
      });
    });
  </script>
</body>
</html>
